<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background for maskable icon requirements -->
  <rect width="512" height="512" rx="15%" fill="#08090a" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1f232b" stroke-width="8" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00f0ff" stroke-width="4" stroke-dasharray="900 1256" stroke-linecap="round" opacity="0.3" transform="rotate(-225 256 256)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#39ff14" stroke-width="6" stroke-dasharray="400 1256" stroke-linecap="round" transform="rotate(-225 256 256)" />

  <!-- Speed Ticks -->
  <g stroke="#4a5264" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="76" x2="256" y2="96" />
    <line x1="76" y1="256" x2="96" y2="256" />
    <line x1="436" y1="256" x2="416" y2="256" />
    <line x1="128" y1="128" x2="142" y2="142" />
    <line x1="384" y1="128" x2="370" y2="142" />
    <line x1="128" y1="384" x2="142" y2="370" />
    <line x1="384" y1="384" x2="370" y2="370" />
  </g>

  <!-- Glowing effect definitions -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>
  </defs>

  <!-- Dial Center Hub -->
  <circle cx="256" cy="256" r="30" fill="#14171e" stroke="#3a4150" stroke-width="4" />
  <circle cx="256" cy="256" r="10" fill="#00f0ff" />

  <!-- Speedometer Needle (glowing neon orange/pink) -->
  <!-- Pointing to roughly 120 km/h (45 degrees clockwise from top) -->
  <g transform="rotate(55 256 256)" filter="url(#glow)">
    <path d="M 256 256 L 251 256 L 253 90 L 256 80 L 259 90 L 261 256 Z" fill="url(#needleGrad)" />
    <!-- Needle highlight -->
    <line x1="256" y1="250" x2="256" y2="85" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
  </g>

  <!-- Digital Display Speed Text (Placeholder for Icon) -->
  <text x="256" y="380" fill="#00f0ff" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" text-anchor="middle" filter="url(#glow)">120</text>
  <text x="256" y="415" fill="#4a5264" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="2">KM/H</text>
</svg>
